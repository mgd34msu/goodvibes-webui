name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test, Typecheck, Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pinned to the locally-verified toolchain. The DOM test harness
          # (happy-dom global-registrator + `bun test --isolate`) is
          # version-sensitive; 1.3.10 produced `window is not defined`.
          bun-version: 1.3.14
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Run tests
        run: bun run test

      - name: Coverage
        run: bun test --isolate --coverage 2>&1 | tee coverage-summary.txt
        continue-on-error: true

      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-summary
          path: coverage-summary.txt
          retention-days: 14
          if-no-files-found: ignore

      - name: Annotate job summary with coverage
        if: always()
        run: |
          {
            echo "## Coverage Report"
            echo '```'
            cat coverage-summary.txt 2>/dev/null || echo "(coverage unavailable)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build
        run: bun run build

      - name: Release gates (SDK pin/lock/install agreement + import sweep)
        run: bun run release:gate

  lint:
    name: Lint (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint
