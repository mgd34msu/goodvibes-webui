name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test, Typecheck, Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pinned to the locally-verified toolchain. The DOM test harness
          # (happy-dom global-registrator + `bun test --isolate`) is
          # version-sensitive; 1.3.10 produced `window is not defined`.
          bun-version: 1.3.14
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Run tests
        run: bun run test

      - name: Coverage
        run: bun test --isolate --coverage 2>&1 | tee coverage-summary.txt
        continue-on-error: true

      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-summary
          path: coverage-summary.txt
          retention-days: 14
          if-no-files-found: ignore

      - name: Annotate job summary with coverage
        if: always()
        run: |
          {
            echo "## Coverage Report"
            echo '```'
            cat coverage-summary.txt 2>/dev/null || echo "(coverage unavailable)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build
        run: bun run build

      - name: Release gates (SDK pin/lock/install agreement + import sweep)
        run: bun run release:gate

  lint:
    name: Lint (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

  e2e:
    # RULING (docs/decisions/2026-07-07-e2e-ci-in-ci.md): the Playwright suite
    # goes in as a separate, initially non-blocking job while specs stabilize,
    # then flips blocking once its promotion criterion is met — 10
    # consecutive green scheduled/main-branch runs with zero flake reruns.
    # Track that count by hand against this job's run history; once satisfied,
    # remove `continue-on-error: true` below (and drop this comment block) in
    # one small follow-up change. Do not add e2e to the SDK or agent repos'
    # release trains — this is webui-first only.
    name: E2E (Playwright, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Get installed Playwright version
        id: playwright-version
        run: echo "version=$(jq -r .version node_modules/@playwright/test/package.json)" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browser binaries
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium + OS deps (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright OS deps only (cache hit, binaries already cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Run e2e suite (phone + desktop, mock daemon, hermetic)
        run: bun run e2e

      - name: Upload traces/report/screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/.artifacts/report
            e2e/.artifacts/test-output
          retention-days: 14
          if-no-files-found: ignore
