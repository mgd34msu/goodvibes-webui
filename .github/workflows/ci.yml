name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  # Single source of truth for the Bun version across all three jobs below
  # (test, lint, e2e) — one place to bump instead of three drifting copies.
  # TRAIN NOTE: this repo can't `uses:` the SDK's composite
  # `.github/actions/setup` action until goodvibes-sdk pushes it (cross-repo
  # `uses:` needs a pushed ref to resolve); once it does, adopt that action
  # here instead of this inlined block. See
  # goodvibes-sdk/docs/release-and-publishing.md ("Shared Toolchain").
  BUN_VERSION: "1.3.14"

permissions:
  contents: read

jobs:
  test:
    name: Test, Typecheck, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pinned via the BUN_VERSION env var above (single source across
          # all three jobs). The DOM test harness (happy-dom
          # global-registrator + `bun test --isolate`) is version-sensitive;
          # 1.3.10 produced `window is not defined`.
          bun-version: ${{ env.BUN_VERSION }}
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Run tests
        run: bun run test

      - name: Coverage
        run: bun test --isolate --coverage 2>&1 | tee coverage-summary.txt

      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-summary
          path: coverage-summary.txt
          retention-days: 14
          if-no-files-found: ignore

      - name: Annotate job summary with coverage
        if: always()
        run: |
          {
            echo "## Coverage Report"
            echo '```'
            cat coverage-summary.txt 2>/dev/null || echo "(coverage unavailable)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build
        run: bun run build

      - name: Release gates (SDK pin/lock/install agreement + import sweep)
        run: bun run release:gate

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          # See the "test" job above for why the version comes from the
          # shared BUN_VERSION env var.
          bun-version: ${{ env.BUN_VERSION }}
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

  e2e:
    # Blocking since 2026-07-07 (docs/decisions/2026-07-07-e2e-ci-in-ci.md):
    # the suite's only red was a deterministic spec defect (a scrim click that
    # raced the drawer animation), not flake — so the "stabilization window"
    # ended immediately. A failing job must fail the run; a run that reports
    # success over a red job is a lie. webui-only: do not add e2e jobs to the
    # SDK or agent repos' release flows.
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    # Headroom above the suite's real runtime: the phone + desktop + lan-origin
    # projects run sequentially (workers:1, fullyParallel:false) and the suite has
    # grown past the old 15-minute cap as coverage expanded (memory diagnostics,
    # one-act local voice setup). 25 leaves margin for runner variance without
    # being effectively unbounded.
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          # See the "test" job above for why the version comes from the
          # shared BUN_VERSION env var.
          bun-version: ${{ env.BUN_VERSION }}
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Get installed Playwright version
        id: playwright-version
        run: echo "version=$(jq -r .version node_modules/@playwright/test/package.json)" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browser binaries
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium + OS deps (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright OS deps only (cache hit, binaries already cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Run e2e suite (phone + desktop, mock daemon, hermetic)
        run: bun run e2e

      - name: Upload traces/report/screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/.artifacts/report
            e2e/.artifacts/test-output
          retention-days: 14
          if-no-files-found: ignore

  auto-release:
    # Zero-touch release: a green push-CI run on main is the only thing that
    # gates a release. This repo ships no artifacts (see CHANGELOG.md) — the
    # git tag plus the GitHub release page, cut here from CHANGELOG.md, is the
    # entire "release." No separate workflow, no manual dispatch, no human
    # step after the other three jobs go green.
    name: Auto Release
    needs: [test, lint, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Read version ${VERSION} from package.json"

      - name: Check whether the release tag already exists
        id: check-tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q .; then
            echo "Tag v${VERSION} already exists on origin — nothing to do."
            echo "exists=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "exists=false" >> "$GITHUB_OUTPUT"

      - name: Create and push release tag
        if: steps.check-tag.outputs.exists != 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${VERSION}" -m "v${VERSION}" "${{ github.sha }}"
          git push origin "refs/tags/v${VERSION}"

      - name: Extract changelog section
        if: steps.check-tag.outputs.exists != 'true'
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES_FILE="release-notes.md"
          awk -v ver="$VERSION" '
            $0 ~ ("^## \\[" ver "\\]") { found=1; next }
            found && /^## \[/ { found=0 }
            found { print }
          ' CHANGELOG.md > "$NOTES_FILE"
          echo "notes_file=${NOTES_FILE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.check-tag.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "Release v${VERSION} already exists — nothing to do."
            exit 0
          fi
          for attempt in $(seq 1 8); do
            if gh release create "v${VERSION}" --title "v${VERSION}" --notes-file "${{ steps.changelog.outputs.notes_file }}" --verify-tag; then
              echo "Release v${VERSION} created."
              exit 0
            fi
            echo "gh release create attempt ${attempt} failed (try ${attempt}/8), retrying..."
            sleep 10
          done
          echo "gh release create failed after 8 attempts"
          exit 1
