name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test, Typecheck, Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
          # Caches ~/.bun/install/cache keyed on bun.lock hash.
          # This avoids re-downloading packages on cache hit.
          cache: true

      # Secondary layer: cache node_modules so symlinking is skipped on hits.
      # Key: runner OS + bun.lock hash. Restore-key falls back to OS prefix
      # so a partial hit still avoids a full cold install.
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-nm-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-nm-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Run tests
        run: bun run test

      - name: Coverage
        run: bun test --coverage 2>&1 | tee coverage-summary.txt
        # TODO: Once the test suite is stable, add --coverage-threshold
        # to enforce a minimum (e.g. --coverage-threshold 70).
        # For now this step is informational only and will not fail the build.
        continue-on-error: true

      - name: Upload coverage summary
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-summary
          path: coverage-summary.txt
          retention-days: 14

      - name: Annotate job summary with coverage
        if: always()
        run: |
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat coverage-summary.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Build
        run: bun run build

  # Lint job is non-blocking. It runs in parallel with `test` and will not
  # fail the pipeline. Remove `continue-on-error` once `lint` is wired up
  # in package.json scripts.
  lint:
    name: Lint (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
          cache: true

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-nm-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-nm-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        # TODO: Add a `lint` script to package.json (e.g. eslint src/).
        # Until then this step will exit non-zero but the job is non-blocking.
        run: bun run lint
